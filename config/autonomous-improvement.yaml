# autonomous-improvement.yaml
# 自律改善システムの設定ファイル
# このファイルを編集することで、Workerが自律的に実行できる改善の範囲を制御できます。

autonomous:

  # ===== 承認なしで自律実行してよい改善の種類 =====
  # 以下に列挙された種類の改善は、Orchestratorを経由してBacklogに自動積みされます。
  # ユーザー確認は不要で、Workerが自発的に提案できます。
  allowed:
    - docs          # ドキュメント・コメントの更新（README, コードコメント等）
    - refactor      # リファクタリング（外部から観測可能な動作を変えない変更のみ）
    - comment       # ログメッセージ・インラインコメントの追加・改善
    - test          # テストケースの追加（既存テストの削除・変更は requires_approval）

  # ===== 必ずユーザー確認が必要な改善 =====
  # 以下に列挙された種類の改善は、Taskviaに type: "improvement" としてログ投稿され、
  # ユーザーが明示的に依頼した場合のみ実行されます。
  # Workerは自分でこれらを実行してはいけません。
  requires_approval:
    - external      # 外部サービス・API への変更（エンドポイント追加・認証変更等）
    - config        # 設定ファイルの変更（このファイル自身も含む）
    - delete        # ファイル・ディレクトリの削除操作
    - dependency    # パッケージ・依存関係の追加・更新・削除
    - new_file      # 新規ファイル・ディレクトリの作成

  # ===== 1日あたりの自律改善実行上限 =====
  # 暴走防止のため、1日（UTC 00:00 リセット）に自律実行できる改善数を制限します。
  # この上限に達した場合、追加の改善提案は requires_approval 扱いとなります。
  # 値を 0 にすると自律改善を完全無効化できます。
  max_per_day: 5
