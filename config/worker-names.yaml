# ロール・スキルのカスタマイズ
# デフォルトでは全ての名前がどの役割にもなれる。
# コメントを外して名前ごとに役割・スキルを固定できる。

customizations:
  # Orchestratorに固定する例:
  # - name: Kai
  #   role: orchestrator

  # Workerに固定してスキルを指定する例:
  # - name: Luca
  #   role: worker
  #   skills: [code, python]

  # 使わない名前を除外する例:
  # - name: Sora
  #   disabled: true

# スキルタグ一覧（参考）
# ops        インフラ・サーバー操作
# bash       シェルスクリプト・コマンド実行
# code       コーディング全般
# python     Python
# typescript TypeScript / JavaScript
# research   調査・情報収集
# database   DB操作・クエリ
# cloud      クラウド（AWS / OCI）
# docs       ドキュメント作成
