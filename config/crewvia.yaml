# crewvia.yaml
# Crewvia システム全体の設定ファイル
# このファイルを編集することでシステムの挙動をユーザー側で調整できます。
#
# 環境変数は常に config ファイルより優先されます。
# 一時的な上書きは env var を使い、永続的な変更はこのファイルを編集してください。

# ===== WIP 制限 =====
# 同時に稼働できる Worker の最大数。Director はこの値を超えて Worker を
# 起動しないようにします。タスクがブロックされる等の緊急時のみ、Director の
# 判断で一時的に超過できます（director.md §7 の WIP 制限の例外 参照）。
#
# 環境変数での上書き: CREWVIA_WIP_LIMIT=12
wip_limit: 8

# ===== モデル選択 =====
# Director と Worker が起動時に使う Claude モデルを指定します。
# 空にすると claude CLI のデフォルト（ユーザーの /model 設定）に従います。
#
# 利用可能な ID:
#   claude-opus-4-6            ← 複雑な調整・計画向き
#   claude-sonnet-4-6          ← バランス型、実装作業向き
#   claude-haiku-4-5-20251001  ← 高速・低コスト、軽タスク向き
#
# 環境変数での上書き:
#   CREWVIA_DIRECTOR_MODEL=claude-opus-4-6
#   CREWVIA_WORKER_MODEL=claude-sonnet-4-6
director_model: claude-opus-4-6
worker_model: claude-sonnet-4-6

# ===== 起動モード =====
# tmux  — Director + Worker を tmux セッション "crewvia" 内に展開（並列 Worker 可）
# inline — 単独プロセスで起動（Worker 並列不可、デバッグ向き）
#
# 環境変数での上書き: CREWVIA_TMUX=1 (tmux) / CREWVIA_TMUX=0 (inline)
mode: tmux

# ===== Taskvia 連携 =====
# Taskvia 承認フローの使用モードを指定します。
#
#   ask      — 起動時に対話プロンプトで選択（デフォルト）
#   enabled  — 常に Taskvia 承認ゲートとログ投稿を使用（TASKVIA_TOKEN 必須）
#   disabled — Taskvia を完全無効化（スタンドアロン動作、トークン不要）
#
# 優先順位: env CREWVIA_TASKVIA > --taskvia/--no-taskvia フラグ > このキー
# 環境変数での上書き: CREWVIA_TASKVIA=enabled|disabled|ask
# CLI フラグでの上書き: ./crewvia --taskvia | ./crewvia --no-taskvia
taskvia: ask

# Taskvia WebUI の URL。
# 環境変数での上書き: TASKVIA_URL=https://...
taskvia_url: https://taskvia.vercel.app

# Taskvia API トークン。
# セキュリティのため、トークンは config/.taskvia-token に記載してください（gitignore 済み）。
# ファイルが存在しない場合はスタンドアロンモードで起動します。
# 環境変数での上書き: TASKVIA_TOKEN=sk-...
