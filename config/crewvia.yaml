# crewvia.yaml
# Crewvia システム全体の設定ファイル
# このファイルを編集することでシステムの挙動をユーザー側で調整できます。
#
# 環境変数は常に config ファイルより優先されます。
# 一時的な上書きは env var を使い、永続的な変更はこのファイルを編集してください。

# ===== WIP 制限 =====
# 同時に稼働できる Worker の最大数。Orchestrator はこの値を超えて Worker を
# 起動しないようにします。タスクがブロックされる等の緊急時のみ、Orchestrator の
# 判断で一時的に超過できます（orchestrator.md §7 の WIP 制限の例外 参照）。
#
# 環境変数での上書き: CREWVIA_WIP_LIMIT=12
wip_limit: 8
