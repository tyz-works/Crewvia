name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  shell-validate:
    name: Shell Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n (syntax check)
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            if ! bash -n "$f" 2>&1; then
              echo "FAIL: $f"
              failed=1
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*" -print0)
          exit $failed

      - name: classify_sh.sh (security scan)
        run: |
          # classify_sh.sh は SAFE=exit 0 / BLOCK=exit 1 を返す。
          # set -e 下で result=$(... classify_sh.sh ...) を直接書くと、BLOCK
          # (exit 1) の瞬間に assignment 行で即 exit してしまい、本来の
          # "BLOCK: ..." メッセージが出力されないまま workflow が失敗する
          # (CI log が sea of SAFE で終わって原因不明になる)。
          # if result=$(...); then ... else ... fi の形にすれば set -e の
          # 早期 exit を回避しつつ、exit code からそのまま BLOCK 判定できる。
          failed=0
          while IFS= read -r -d '' f; do
            if result=$(bash scripts/shared/classify_sh.sh "$f" 2>&1); then
              echo "SAFE: $f"
            else
              echo "BLOCK: $f — $result"
              failed=1
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*" -not -path "./scripts/shared/classify_sh.sh" -print0)
          exit $failed

  yaml-validate:
    name: YAML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: YAML syntax check
        run: |
          python3 - <<'EOF'
          import sys, pathlib, yaml

          failed = False
          for p in pathlib.Path('.').rglob('*.yaml'):
              if '.git' in p.parts:
                  continue
              try:
                  yaml.safe_load(p.read_text())
              except yaml.YAMLError as e:
                  print(f"FAIL: {p} — {e}")
                  failed = True

          sys.exit(1 if failed else 0)
          EOF
