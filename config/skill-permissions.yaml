# config/skill-permissions.yaml
# スキル別ツール権限定義
#
# allow: このスキルのタスクで自動許可するツールパターン
# deny:  このスキルのタスクで自動拒否するツールパターン
#
# パターン構文:
#   - ツール名そのまま: "Edit", "Write", "MultiEdit"
#   - Bash コマンド:    "Bash(npm *)", "Bash(git *)"
#   - ワイルドカード:   fnmatch 準拠 (* は任意文字列)
#
# SAFE_TOOLS (Read, Grep, Glob, WebSearch 等) は hook で既にスキップされるため
# ここに記載不要。
#
# 判定フロー:
#   1. _global.deny にマッチ → 即拒否 (urgent でもオーバーライド不可)
#   2. タスク skills の deny にマッチ → 拒否 (urgent なら Taskvia 例外承認)
#   3. タスク skills の allow にマッチ → 即許可 (Taskvia スキップ)
#   4. どちらにもマッチしない → 既存 Taskvia フローへ fallthrough

# 全スキル共通の絶対禁止 (urgent でもオーバーライド不可)
_global:
  deny:
    - "Bash(rm -rf *)"
    - "Bash(sudo *)"
    - "Bash(curl*| sh*)"
    - "Bash(curl*|sh*)"
    - "Bash(curl*| bash*)"
    - "Bash(curl*|bash*)"
    - "Bash(wget*| sh*)"
    - "Bash(wget*|sh*)"
    - "Bash(wget*| bash*)"
    - "Bash(wget*|bash*)"
    - "Bash(git push origin main*)"
    - "Bash(git push origin master*)"
    - "Bash(git push --force*)"
    - "Bash(git push -f *)"

skills:
  bash:
    allow:
      - "Bash(*)"
      - "Edit"
      - "Write"
      - "MultiEdit"
    deny:
      - "Bash(terraform destroy*)"
      - "Bash(kubectl delete*--all*)"

  ops:
    allow:
      - "Bash(*)"
      - "Edit"
      - "Write"
      - "MultiEdit"
    deny:
      - "Bash(terraform destroy*)"

  code:
    allow:
      - "Edit"
      - "Write"
      - "MultiEdit"
      - "Bash(npm *)"
      - "Bash(npx *)"
      - "Bash(tsc *)"
      - "Bash(eslint *)"
      - "Bash(prettier *)"
      - "Bash(git *)"
      - "Bash(gh pr create*)"
      - "Bash(gh pr view*)"
      - "Bash(gh run *)"
    deny: []

  python:
    allow:
      - "Edit"
      - "Write"
      - "MultiEdit"
      - "Bash(python*)"
      - "Bash(pip *)"
      - "Bash(pytest *)"
      - "Bash(git *)"
      - "Bash(gh pr create*)"
      - "Bash(gh pr view*)"
      - "Bash(gh run *)"
    deny: []

  typescript:
    allow:
      - "Edit"
      - "Write"
      - "MultiEdit"
      - "Bash(npm *)"
      - "Bash(npx *)"
      - "Bash(tsc *)"
      - "Bash(node *)"
      - "Bash(bun *)"
      - "Bash(git *)"
      - "Bash(gh pr create*)"
      - "Bash(gh pr view*)"
      - "Bash(gh run *)"
    deny: []

  research:
    allow: []
    deny:
      - "Edit"
      - "Write"
      - "MultiEdit"
      - "Bash(git push *)"

  review:
    allow:
      - "Bash(gh pr *)"
      - "Bash(gh api *)"
      - "Bash(gh-app-review *)"
      - "Bash(gh run *)"
      - "Bash(git diff*)"
      - "Bash(git log*)"
      - "Bash(git show*)"
      - "Bash(git fetch*)"
      - "Bash(git branch*)"
      - "Bash(git status*)"
      - "Bash(git rev-parse*)"
      - "Bash(git checkout*)"
      - "Bash(git merge*)"
      - "Bash(npm test*)"
      - "Bash(npm run lint*)"
      - "Bash(npm run typecheck*)"
      - "Bash(npm run build*)"
    deny:
      - "Edit"
      - "Write"
      - "MultiEdit"

  database:
    allow:
      - "Edit"
      - "Write"
      - "MultiEdit"
      - "Bash(psql *)"
      - "Bash(sqlite3 *)"
      - "Bash(git *)"
    deny:
      - "Bash(*DROP *)"
      - "Bash(*TRUNCATE *)"
      - "Bash(*DELETE FROM *)"

  cloud:
    allow:
      - "Bash(oci *)"
      - "Bash(aws *)"
      - "Edit"
      - "Write"
      - "MultiEdit"
    deny:
      - "Bash(terraform destroy*)"

  docs:
    allow:
      - "Edit"
      - "Write"
      - "MultiEdit"
      - "Bash(git *)"
    deny: []

  qa:
    allow:
      - "Edit"
      - "Write"
      - "MultiEdit"
      - "Bash(npm test*)"
      - "Bash(npm run *)"
      - "Bash(npx playwright*)"
      - "Bash(pytest *)"
      - "Bash(node *)"
      - "Bash(git diff*)"
      - "Bash(git log*)"
      - "Bash(git status*)"
      - "Bash(git fetch*)"
      - "Bash(git show*)"
      - "Bash(git branch*)"
      - "Bash(git rev-parse*)"
      - "Bash(gh pr *)"
      - "Bash(curl -s *)"
      - "Bash(kill *)"
    deny:
      - "Bash(git push*)"
      - "Bash(git commit*)"
      - "Bash(gh pr merge*)"

  verify:
    allow:
      - "Read(**)"
      - "Grep(**)"
      - "Glob(**)"
      - "Bash(npm test*)"
      - "Bash(npm run lint*)"
      - "Bash(npm run typecheck*)"
      - "Bash(git diff*)"
      - "Bash(git log*)"
      - "Bash(python3 scripts/verify-task.sh*)"
    deny:
      # hooks/pre-tool-use.sh:157-161 は非 Bash ツールに bare token を渡すため
      # bare 形式で記述する (research / review skill と同様)。`Edit(**)` 等は
      # never-match だったため削除。intent は agents/verifier.md にも記載通り
      # 「コード変更なし、検証のみ」。
      - "Edit"
      - "Write"
      - "MultiEdit"
      - "Bash(git commit*)"
      - "Bash(git push*)"
      - "Bash(rm*)"
      - "Bash(mv*)"

  planning:
    allow:
      - "Bash(*/plan.sh status*)"
      - "Bash(*/plan.sh pull*)"
      - "Bash(git log*)"
      - "Bash(git diff*)"
    deny:
      # bare 形式: research / review skill と同じ規約。hook の bare token
      # signature と一致させる。planning は plan.sh status/pull で読むだけ。
      - "Edit"
      - "Write"
      - "MultiEdit"
      - "Bash(git commit*)"
      - "Bash(git push*)"

  plan_review:
    allow:
      - "Read(**)"
      - "Grep(**)"
      - "Glob(**)"
    deny:
      - "Write(**)"
      - "Edit(**)"
      - "MultiEdit(**)"
      - "Bash(**)"
